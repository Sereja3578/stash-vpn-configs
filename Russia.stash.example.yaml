rules:
  # Keep a corporate DIRECT exception before broader public-domain rules.
  # - DOMAIN-SUFFIX,corp.example,DIRECT
  - RULE-SET,common-openai,PROXY
  - DOMAIN-SUFFIX,github.com,DIRECT
  - RULE-SET,common-instagram-meta,PROXY
  - RULE-SET,common-whatsapp,PROXY
  - RULE-SET,common-linkedin,PROXY
  - RULE-SET,common-discord,PROXY
  - RULE-SET,common-twitter-x,PROXY
  - RULE-SET,common-google-ai,PROXY
  - RULE-SET,russia-youtube,PROXY
  - RULE-SET,russia-ru-blocked-or-sensitive,PROXY
  - DOMAIN-SUFFIX,githubusercontent.com,DIRECT
  - DOMAIN,your-provider.example,DIRECT
  - RULE-SET,common-bybit-low-restrict,LOW-RESTRICT-FOREIGN

  - RULE-SET,steam,DIRECT
  - DOMAIN-KEYWORD,steam,DIRECT
  - DOMAIN-KEYWORD,valve,DIRECT
