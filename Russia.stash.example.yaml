---
mode: rule
log-level: warning
ipv6: false

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.home.arpa"
    - localhost
    - localhost.*
  default-nameserver:
    - 77.88.8.8
    - 1.1.1.1
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  follow-rule: false

  nameserver-policy:
    # Optional corporate split DNS; replace with your own suffix and VPN DNS.
    # "+.corp.example":
    #   - 10.0.0.53
    "+.ru": 77.88.8.8
    "+.su": 77.88.8.8
    "+.xn--p1ai": 77.88.8.8
proxy-providers:
  vless-space:
    type: http
    url: "https://YOUR_STASH_PROVIDER_URL/example.yaml"
    path: ./providers/vless-space-clashverge-v2.yaml
    interval: 3600
    proxy: DIRECT
proxies: []

proxy-groups:
  - name: PROXY
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png
    type: select
    proxies:
      - FASTER-FOREIGN
      - MANUAL
      - LOW-RESTRICT-FOREIGN
      - RU-PROXY
      - RU
      - DIRECT

  - name: LOW-RESTRICT-FOREIGN
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Global.png
    type: select
    proxies:
      - LOW-RESTRICT-AUTO
      - LOW-RESTRICT-MANUAL

  - name: LOW-RESTRICT-AUTO
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Global.png
    type: url-test
    filter: '^(?!.*(?:USA|United States|Canada|Singapore|Hong Kong|France|United Kingdom|UK|UAE|United Arab Emirates|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Poland|Sweden).*Gemini.*$'
    use:
      - vless-space
    interval: 300
    tolerance: 50
    lazy: true
    url: https://www.gstatic.com/generate_204

  - name: LOW-RESTRICT-MANUAL
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Static.png
    type: select
    filter: '^(?!.*(?:USA|United States|Canada|Singapore|Hong Kong|France|United Kingdom|UK|UAE|United Arab Emirates|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Poland|Sweden).*Gemini.*$'
    use:
      - vless-space

  - name: RU-PROXY
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Russia.png
    type: fallback
    proxies:
      - RU
    interval: 300
    timeout: 5
    lazy: false
    url: https://www.avito.ru

  - name: RU
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Russia.png
    type: url-test
    filter: '(?i)(Russia|Россия|🇷🇺)'
    use:
      - vless-space
    interval: 300
    tolerance: 50
    lazy: true
    url: https://www.avito.ru

  - name: FASTER-FOREIGN
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Auto.png
    type: url-test
    filter: '^(?!.*(?:USA|United States|Canada|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Netherlands|Poland|Sweden).*Gemini.*$'
    use:
      - vless-space
    interval: 300
    tolerance: 50
    lazy: true
    url: https://www.gstatic.com/generate_204

  - name: MANUAL
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Static.png
    type: select
    use:
      - vless-space
    proxies:
      - LOW-RESTRICT-FOREIGN
      - FASTER-FOREIGN
      - RU-PROXY
      - RU
      - DIRECT

